<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title -->
    <title>English Janala | Best Platform For Learning English</title>

    <!-- fave icon -->
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon">

    <!-- daisy ui and tailwind css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google fonts integration english-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- google fonts integration bangla -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- style -->
    <link rel="stylesheet" href="./style/style.css">

</head>

<body class="max-w-[80%] mx-auto">
    <!-- nav bar section  -->
    <header>
        <nav>
            <div class="navbar bg-base-100 shadow-sm">
                <div class="navbar-start">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>
                        <ul tabindex="-1"
                            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow space-y-4">
                            <li><a class="text-primary text-lg font-bold" href="#"><i
                                        class="fa-solid fa-circle-question"></i> FAQ</a></li>

                            <li><a class="text-primary text-lg font-bold" href="#"><i class="fa-solid fa-book-open"></i>
                                    Learn</a></li>

                            <li><a class="text-primary text-lg font-bold" href="#"><i
                                        class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>
                        </ul>
                    </div>
                    <a href="" class="flex items-center gap-1">
                        <span class="text-[1.5rem] font-semibold">English</span>
                        <img src="./assets/logo.png" width="40px" height="0px" class="w-[30px] h-[30px]" alt="">
                        <span class="text-[1.5rem] font-bangla font-semibold">জানালা</span></a>
                </div>
                <div class="navbar-end hidden lg:flex">
                    <ul class="menu menu-horizontal px-1 space-x-4">
                        <li><a class="btn btn-outline btn-primary text-lg font-bold" href="#"><i
                                    class="fa-solid fa-circle-question"></i> FAQ</a></li>

                        <li><a class="btn btn-outline btn-primary text-lg font-bold" href="#"><i
                                    class="fa-solid fa-book-open"></i> Learn</a></li>

                        <li><a class="btn btn-outline btn-primary text-lg font-bold" href="#"><i
                                    class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>

                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- hero section -->
    <section class="flex flex-col-reverse md:flex-row gap-5 justify-between items-center py-5 w-11/12 mx-auto ">
        <div class="content flex-1 space-y-2 text-center md:text-left">
            <h2 class="text-4xl font-bold mb-8"><span class="text-info">English</span> is Easy!!</h2>
            <p class="font-bangla font-semibold"> আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা <br>
                আপনার দক্ষতা বাড়াতে চান, আমাদের <span>Interactive Lessons</span> আপনাকে নিয়ে <br> যাবে অন্য একটি
                <span>Level</span> এ
            </p>

            <form action="#" class="space-y-4">
                <fieldset class="fieldset">
                    <div class="grid justify-center md:justify-start space-y-4">
                        <input type="text" class="input" placeholder="Enter Your Name" />
    
                        <input type="password" class="input" placeholder="Enter Your Password" />

                    </div>


                </fieldset>
                <button class="btn btn-primary">Get Started</button>
            </form>

        </div>
        <div class="image flex-1">
            <img src="./assets/hero-student.png" alt="Student image">
        </div>
    </section>

    <!-- let's learn vocabularies -->
    <section class="w-11/12 mx-auto py-5">
        <h2 class="text-4xl font-bold text-center"><span class="text-cyan-400">Let's</span> Learn Vocabularies</h2>

        <div id="level-container" class=" flex gap-5 flex-wrap justify-center my-6">

        </div>

    </section>

    <!-- Word card section -->
     <section id="word-container" class="bg-gray-100 p-10 w-11/12 mx-auto my-10 grid grid-cols-3 gap-5 ">
        
     </section>










    <script src="script/script.js"></script>
</body>

</html>
